<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estiloMain.css">
    <title>Pura Sorte</title>
</head>

<body>
    <div class="main">
        <div class="div-titulo">
            <h2 class="titulo-main">Pura Sorte</h2>
        </div>

        <div class="container-conteudo">
            <div class="div-select">
                <select id="ipt_cavalo" class="select-cavalo">
                    <option value="0">Selecione:</option>
                    <option value="1">Cavalo 1</option>
                    <option value="2">Cavalo 2</option>
                    <option value="3">Cavalo 3</option>
                    <option value="4">Cavalo 4</option>
                    <option value="5">Cavalo 5</option>
                </select>
            </div>

            <div class="div-aposta">
                <div class="valor-aposta">
                    <p class="titulo-valor-aposta">Valor Apostado:</p>
                    <input id="ipt_valor" type="number" class="input-aposta">
                    <button onclick="jogar()" class="botao-apostar">Dar uma Volta</button>
                </div>

                <div class="div-apostar">
                    <div id="div_msg" class="div-resposta"></div>
                </div>
            </div>
        </div>

    </div>
</body>

<script src="scriptTurfe.js"></script>
</html>
